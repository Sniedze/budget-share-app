version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: budget-share-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: budget_app
      MYSQL_USER: budget_user
      MYSQL_PASSWORD: budget_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
